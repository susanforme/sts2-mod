name: Build JhinMod
permissions:
  contents: write
on:
  push:
    branches: [main, master]
    paths:
      - 'jhin/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'jhin/**'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  MOD_ID: JhinMod

jobs:
  build:
    name: Build & Pack
    runs-on: windows-latest
    defaults:
      run:
        working-directory: jhin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: |
          dotnet restore jhin.csproj
          dotnet build jhin.csproj -c Release

      - name: Prepare BaseLib content
        shell: pwsh
        run: |
          $src = "$env:USERPROFILE\.nuget\packages\alchyr.sts2.baselib"
          $ver = Get-ChildItem $src -Directory | Sort-Object Name -Descending | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path lib\BaseLib | Out-Null
          Copy-Item "$($ver.FullName)\Content\BaseLib.json" lib\BaseLib\BaseLib.json -Force
          Copy-Item "$($ver.FullName)\Content\BaseLib.pck" lib\BaseLib\BaseLib.pck -Force

      - name: Download Godot
        shell: pwsh
        run: |
          $zip = "$env:RUNNER_TEMP\godot.zip"
          $dir = "$env:RUNNER_TEMP\godot"
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_win64.zip" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dir -Force
          $exe = Get-ChildItem $dir -Recurse -Filter "Godot_v4.5.1-stable_mono_win64.exe" | Select-Object -First 1
          echo "GODOT=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Export PCK
        shell: pwsh
        run: |
          $out = "dist\$env:MOD_ID"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Start-Process -FilePath $env:GODOT -ArgumentList "--headless","--path","$PWD","--export-pack","WindowsDesktop","$PWD\$out\$env:MOD_ID.pck" -Wait -NoNewWindow
          if (-not (Test-Path "$out\$env:MOD_ID.pck")) { throw "PCK export failed" }

      - name: Generate mod.json and collect files
        shell: pwsh
        run: |
          $out = "dist\$env:MOD_ID"
          Copy-Item ".godot\mono\temp\bin\Release\jhin.dll" "$out\$env:MOD_ID.dll"
          @{
            id = "$env:MOD_ID"
            name = "Jhin"
            author = "桃花笑春风"
            description = "Jhin character mod for Slay the Spire 2."
            version = "0.1.0"
            has_dll = $true
            has_pck = $true
            dependencies = @("BaseLib")
            affects_gameplay = $true
          } | ConvertTo-Json | Set-Content "$out\$env:MOD_ID.json" -Encoding UTF8

      - name: Package zip
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '-'
          $time = Get-Date -Format "yyyyMMdd-HHmmss"
          $zip = "$PWD\dist\jhin-$branch-$time.zip"
          Compress-Archive -Path "dist\$env:MOD_ID\*" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_ENV
          echo "RELEASE_NAME=jhin-$branch-$time" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JhinMod
          path: ${{ env.ZIP }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.ZIP }}
